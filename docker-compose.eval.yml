# MCAP Replay Evaluation Stack
#
# Orchestrates offline model evaluation using real MCAP recordings:
#   mcap-player   = replays MCAP files as ROS2 topics, one episode at a time
#   inference     = runs the trained model (with remapped output topics)
#   eval-recorder = records GT + predicted actions, computes metrics per episode
#
# Do NOT use this for live robot control. inference_eval.yaml remaps action
# output topics to /eval/* so GT actions from MCAP replay can coexist.
#
# Usage (via anvil-eval-ros CLI — recommended):
#   uv run anvil-eval-ros \
#     --checkpoint /path/to/checkpoint \
#     --mcap-root data/raw/placing-block-r1/
#
# Usage (manual):
#   MODEL_PATH=/path/to/checkpoint \
#   MCAP_ROOT=data/raw/placing-block-r1/ \
#   OUTPUT_DIR=eval_results/ros/my-run/ \
#   EVAL_PLAN_FILE=eval_results/ros/my-run/eval_plan.json \
#   docker compose -f docker-compose.eval.yml up --build --abort-on-container-exit
#
# Optional env overrides:
#   ROS_DOMAIN_ID         — ROS domain (default: 42)
#   IMAGE_TAG             — Docker image tag (default: latest)
#   HF_CACHE              — HuggingFace model cache (needed for VLA models)
#   EVAL_WARMUP_SEC       — Inference warmup seconds before first episode (default: 5)
#   EVAL_DRAIN_SEC        — Inference drain wait after bag ends (default: 3)
#   INFERENCE_CONFIG_FILE — Path to inference YAML (auto-generated by anvil-eval-ros)
#   EVAL_GT_TOPICS        — ROS2 array of GT action topics (auto-set by anvil-eval-ros)
#   EVAL_PRED_TOPICS      — ROS2 array of predicted action topics (auto-set)
#   EVAL_ARM_NAMES        — ROS2 array of arm names (auto-set)

x-base: &base
  image: ghcr.io/anvil-robotics/lerobot-inference:${IMAGE_TAG:-latest}
  build:
    context: .
    dockerfile: docker/inference/Dockerfile
    args:
      LEROBOT_VERSION: ${LEROBOT_VERSION:-0.5.1}
      LEROBOT_EXTRAS: ${LEROBOT_EXTRAS:-}
  networks:
    - ros2_eval
  environment:
    - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
    - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    - CYCLONEDDS_URI=file:///workspace/configs/cyclonedds/test_bridge.xml
  volumes:
    - ./configs:/workspace/configs:ro

services:

  # ── 1. Inference node (remapped output topics via inference_eval.yaml) ────
  inference:
    <<: *base
    container_name: lerobot-eval-inference
    volumes:
      - ${MODEL_PATH:?MODEL_PATH is required}:/workspace/model:ro
      - ${INFERENCE_CONFIG_FILE:-./configs/lerobot_control/inference_eval.yaml}:/workspace/config.yaml:ro
      - ${HF_CACHE:-.docker_empty_hf_cache}:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      ros2 launch lerobot_control inference.launch.py
        model_path:=/workspace/model
        config_file:=/workspace/config.yaml

  # ── 2. MCAP player — replays episodes, coordinates eval flow ─────────────
  mcap-player:
    <<: *base
    container_name: lerobot-eval-player
    volumes:
      - ${MCAP_ROOT:?MCAP_ROOT is required}:/workspace/mcap_data:ro
      - ${EVAL_PLAN_FILE:?EVAL_PLAN_FILE is required}:/workspace/eval_plan.json:ro
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///workspace/configs/cyclonedds/test_bridge.xml
      - EVAL_WARMUP_SEC=${EVAL_WARMUP_SEC:-5}
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f mcap_player_node > /dev/null"]
      start_period: 8s
      interval: 2s
      timeout: 3s
      retries: 20
    depends_on:
      inference:
        condition: service_started
    command: >
      ros2 run lerobot_control mcap_player_node
        --ros-args
        -p eval_plan_file:=/workspace/eval_plan.json
        -p warmup_sec:=${EVAL_WARMUP_SEC:-5.0}

  # ── 3. Eval recorder — records actions, computes metrics per episode ──────
  eval-recorder:
    <<: *base
    container_name: lerobot-eval-recorder
    volumes:
      - ${OUTPUT_DIR:?OUTPUT_DIR is required}:/workspace/eval_results
      # Mount anvil_eval source directly so the recorder can import it
      - ./packages/anvil_eval/src:/workspace/anvil_eval_src:ro
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///workspace/configs/cyclonedds/test_bridge.xml
      - ANVIL_EVAL_PATH=/workspace/anvil_eval_src
      - EVAL_DRAIN_SEC=${EVAL_DRAIN_SEC:-3}
    depends_on:
      mcap-player:
        condition: service_healthy
    command: >
      ros2 run lerobot_control eval_recorder_node
        --ros-args
        -p output_dir:=/workspace/eval_results
        -p inference_drain_sec:=${EVAL_DRAIN_SEC:-3.0}
        -p gt_topics:=${EVAL_GT_TOPICS:-["/follower_l_forward_position_controller/commands","/follower_r_forward_position_controller/commands"]}
        -p pred_topics:=${EVAL_PRED_TOPICS:-["/eval/follower_l_forward_position_controller/commands","/eval/follower_r_forward_position_controller/commands"]}
        -p arm_names:=${EVAL_ARM_NAMES:-["left","right"]}

networks:
  ros2_eval:
    driver: bridge
