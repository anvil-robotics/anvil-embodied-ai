# =============================================================================
# LeRobot Inference Configuration - 4 Camera Setup
# =============================================================================
# Must match data conversion config (configs/mcap_converter/) for correct mapping
#
# Parameters NOT in this file are set via ROS2 parameters:
#   - model_path, device, control_frequency, image_height/width, mode

model:
  type: "act"  # Model type: act, diffusion, smolvla

  # Runtime config overrides (null = use model defaults from checkpoint)
  chunk_size: null
  n_action_steps: null

  # Temporal ensemble (ACT only): smooths motion by averaging overlapping chunks
  # When enabled, n_action_steps is forced to 1. Use 0.01 (paper default) or null to disable
  temporal_ensemble_coeff: null

  # Delta actions: true = model outputs delta positions, convert to absolute before publishing
  use_delta_actions: true

  # Task description for VLA models (SmolVLA only, ignored for ACT/Diffusion)
  task_description: ""

# -----------------------------------------------------------------------------
# Joint Configuration
# -----------------------------------------------------------------------------
joint_state_topic: "/joint_states"

joint_names:
  # Joint order as output by ML model (must match training dataset)
  model_joint_order:
    - finger_joint1
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint6
    - joint7

  # Joint order expected by ROS2 forward_position_controller
  controller_joint_order:
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint6
    - joint7
    - finger_joint1

# -----------------------------------------------------------------------------
# Arm Configuration
# -----------------------------------------------------------------------------
# ML model outputs: action = [left_joints..., right_joints...]
# Split and publish to separate controller topics

arms:
  left:
    ros_prefix: "follower_l"
    command_topic: "/follower_l_forward_position_controller/commands"
    action_start: 0
    action_end: 8
  right:
    ros_prefix: "follower_r"
    command_topic: "/follower_r_forward_position_controller/commands"
    action_start: 8
    action_end: 16

# -----------------------------------------------------------------------------
# Camera Mapping
# -----------------------------------------------------------------------------
# ROS topic -> ML model camera name (must match training config)

camera_mapping:
  "/cam_waist/image_raw/compressed": "waist"
  "/cam_wrist_r/image_raw/compressed": "wrist_r"
  "/cam_chest/image_raw/compressed": "chest"
  "/cam_wrist_l/image_raw/compressed": "wrist_l"

# -----------------------------------------------------------------------------
# Safety Parameters
# -----------------------------------------------------------------------------
safety:
  max_position_delta: 0.1  # Maximum position change per step (radians)
