# =============================================================================
# LeRobot Inference Configuration
# =============================================================================
# Parameters set via ROS2 launch args (not in this file):
#   model_path, device, control_frequency, image_height/width, monitor_only
#
# Model type and training flags are auto-read from the checkpoint.
# Only set fields here to override checkpoint values or provide runtime config.

# -----------------------------------------------------------------------------
# Model
# -----------------------------------------------------------------------------
model:
  # VLA task prompt — required for SmolVLA / Pi0 / Pi0.5, ignored for ACT / Diffusion
  # Set to the task the model was trained/finetuned for.
  task_description: null

  # use_delta_actions: read automatically from anvil_config.json in the checkpoint.
  # Set here only for checkpoints trained before anvil_config.json was introduced.
  # use_delta_actions: false

# -----------------------------------------------------------------------------
# Inference Tuning
# -----------------------------------------------------------------------------
# Override checkpoint defaults. null = use the value the model was trained with.
#
# n_action_steps — steps to execute before re-running inference.
#
#   Example: chunk_size=100 (from checkpoint), n_action_steps=50
#
#     Inference → [a0, a1, ..., a49 | a50, ..., a99]
#                  └── execute these ──┘  └─ discarded ─┘
#     Inference again → [a0', a1', ...]
#
#   Tuning guide:
#     jittery / oscillating  → raise, or enable temporal_ensemble_coeff
#     hesitates / freezes    → lower
#     slow to react          → lower
#     GPU can't keep up      → lower (or reduce control_frequency)
#
# temporal_ensemble_coeff (ACT only) — re-infers every step and exponentially
#   weights overlapping predictions. Use 0.01 (paper default). Forces n_action_steps=1.

inference_tuning:
  n_action_steps: null
  temporal_ensemble_coeff: null

# -----------------------------------------------------------------------------
# Joint Configuration
# -----------------------------------------------------------------------------
joint_state_topic: "/joint_states"

joint_names:
  # Joint order as output by ML model (must match training dataset)
  model_joint_order:
    - finger_joint1
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint6
    - joint7

  # Joint order expected by ROS2 forward_position_controller
  controller_joint_order:
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint6
    - joint7
    - finger_joint1

  # arm_mapping controls how observation.state is assembled:
  #   Keys are used in joint name lookup: f"{observation_prefix}_{arm_key}_{joint_id}"
  #   For bimanual Anvil robot: {l: left, r: right} → 2×8 = 16 DOF state
  #   For pi05_libero_finetuned (single-arm, 8 DOF): use only one arm below.
  arm_mapping:
    l: left
    r: right

  # Anvil bimanual model uses position + velocity + effort as state inputs
  state_features:
    - position
    - velocity
    - effort

# -----------------------------------------------------------------------------
# Arm Configuration
# -----------------------------------------------------------------------------
# ML model outputs: action = [left_joints..., right_joints...]
# Split and publish to separate controller topics

arms:
  left:
    ros_prefix: "follower_l"
    command_topic: "/follower_l_forward_position_controller/commands"
    action_start: 0
    action_end: 8
  right:
    ros_prefix: "follower_r"
    command_topic: "/follower_r_forward_position_controller/commands"
    action_start: 8
    action_end: 16

# -----------------------------------------------------------------------------
# Camera Mapping
# -----------------------------------------------------------------------------
# ROS topic -> ML model camera name (must match training config)

camera_mapping:
  "/cam_waist/image_raw/compressed": "waist"
  "/cam_wrist_r/image_raw/compressed": "wrist_r"
  "/cam_chest/image_raw/compressed": "chest"
  "/cam_wrist_l/image_raw/compressed": "wrist_l"

# -----------------------------------------------------------------------------
# Safety Parameters
# -----------------------------------------------------------------------------
# max_position_delta: maximum joint position change per step (radians).
# Uncomment to override the code default of 0.1 rad.
# safety:
#   max_position_delta: 0.1

# -----------------------------------------------------------------------------
# RTC — Real-Time Chunking (VLA models only: pi0, pi0.5, smolvla)
# -----------------------------------------------------------------------------
# VLA models always use RTC. ACT / Diffusion ignore this section entirely.
#
# How RTC works:
#   A background thread runs inference continuously. While the robot executes
#   the current action chunk from ActionQueue, the thread predicts the next
#   chunk guided by the tail of the previous one (prefix attention). This
#   eliminates the control-loop stall that occurs when a new chunk is needed.
#
# inference_delay: initial step-count estimate for inference latency.
#   LatencyTracker accumulates real timings and auto-refines this each cycle.
#   A safe starting value is ceil(expected_latency_sec * control_freq).
#   e.g. 200 ms inference at 30 Hz → ceil(0.2 * 30) = 6.
#
# queue_trigger_threshold: re-trigger inference when ActionQueue depth falls
#   to or below this count. Set equal to chunk_size for maximum overlap.
#
# execution_horizon: steps from the previous chunk kept as RTC guidance prefix.
#   Recommended: 8–12. Higher → stronger continuity, lower → faster adaptation.
#
# max_guidance_weight: gradient guidance strength for the prefix attention.
#   Default 10.0 is tuned for 10-step DDIM flow-matching (pi0/pi05/smolvla).
#
# prefix_attention_schedule: how guidance weight decays across the prefix.
#   LINEAR | EXP | ONES | ZEROS  (EXP recommended)

rtc:
  # Baseline benchmark (RTX 4090, pi05_libero_finetuned, chunk_size=50, 10 DDIM steps):
  #   mean latency: 215.8 ms  p95: 224.6 ms  →  ceil(0.225 × 30 Hz) = 7 steps
  inference_delay: 7
  # Set equal to chunk_size for maximum RTC overlap (inference starts as soon as
  # current chunk is dispatched, eliminating the stall between chunks).
  # chunk_size=50 → threshold=50
  queue_trigger_threshold: 50
  execution_horizon: 10
  max_guidance_weight: 10.0
  prefix_attention_schedule: EXP
