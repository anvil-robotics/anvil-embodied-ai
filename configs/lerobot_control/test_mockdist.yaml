# =============================================================================
# Mock Distributed Test Configuration
# =============================================================================
# Matches the topics published by mock_controller_node for CycloneDDS testing.
# Used by docker-compose.mockdist.yml — no real hardware or model needed.

joint_state_topic: "/joint_states"

joint_names:
  model_joint_order:
    - left_joint_1
    - left_joint_2
    - left_joint_3
    - left_joint_4
    - left_joint_5
    - left_joint_6
    - left_joint_7
    - right_joint_1
    - right_joint_2
    - right_joint_3
    - right_joint_4
    - right_joint_5
    - right_joint_6
    - right_joint_7

  controller_joint_order:
    - left_joint_1
    - left_joint_2
    - left_joint_3
    - left_joint_4
    - left_joint_5
    - left_joint_6
    - left_joint_7
    - right_joint_1
    - right_joint_2
    - right_joint_3
    - right_joint_4
    - right_joint_5
    - right_joint_6
    - right_joint_7

camera_mapping:
  "/camera0/image_raw/compressed": "waist"
  "/camera1/image_raw/compressed": "wrist_r"
  "/camera2/image_raw/compressed": "chest"
  "/camera3/image_raw/compressed": "wrist_l"
