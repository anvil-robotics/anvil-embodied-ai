# =============================================================================
# LeRobot Inference Configuration — SINGLE ARM (right)
# =============================================================================
# For single-arm datasets (8 DOF state, 8 DOF action).
# For bimanual use: inference_default.yaml

model:
  task_description: null

inference_tuning:

  # ACT
  act:
    n_action_steps: null
    temporal_ensemble_coeff: null

  # Diffusion
  diffusion:
    n_action_steps: null
    num_inference_steps: 10

  # RTC — VLA models only
  rtc:
    inference_delay: 10
    queue_trigger_threshold: 50
    execution_horizon: 12
    max_guidance_weight: 10.0
    prefix_attention_schedule: EXP

joint_state_topic: "/joint_states"

joint_names:
  model_joint_order:
    - finger_joint1
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint6
    - joint7

  controller_joint_order:
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint6
    - joint7
    - finger_joint1

  # Single arm: right only
  arm_mapping:
    r: right

  state_features:
    - position
    - velocity
    - effort

arms:
  right:
    ros_prefix: "follower_r"
    command_topic: "/follower_r_forward_position_controller/commands"
    action_start: 0
    action_end: 8

camera_mapping:
  "/cam_waist/image_raw/compressed": "waist"
  "/cam_wrist_r/image_raw/compressed": "wrist_r"
  "/cam_chest/image_raw/compressed": "chest"
