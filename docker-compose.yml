services:
  inference:
    image: ghcr.io/anvil-robotics/lerobot-inference:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/inference/Dockerfile
      args:
        LEROBOT_VERSION: ${LEROBOT_VERSION:-0.5.0}
        LEROBOT_EXTRAS: ${LEROBOT_EXTRAS:-}
    container_name: lerobot-inference
    network_mode: host
    ipc: host
    privileged: true
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-}
      - CYCLONEDDS_URI=${CYCLONEDDS_URI:-}
      - MONITOR_ONLY=${MONITOR_ONLY:-false}
      - DEBUG=${DEBUG:-false}
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Both MODEL_PATH and CONFIG_FILE are host paths — tab-completion works naturally.
      # CONFIG_FILE defaults to inference_default.yaml if not set.
      - ${MODEL_PATH:?MODEL_PATH is required}:/workspace/model:ro
      - ${CONFIG_FILE:-./configs/lerobot_control/inference_default.yaml}:/workspace/config.yaml:ro
      # HF_CACHE — VLA models (pi0/pi05/smolvla) need PaliGemma tokenizer at runtime.
      # HuggingFace needs write access to create lock files when loading tokenizers.
      - ${HF_CACHE:-.docker_empty_hf_cache}:/root/.cache/huggingface
      # DEBUG=true: pre-model input frames saved here for training/inference comparison
      - ./debug_images:/workspace/debug_images
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ros2 launch lerobot_control inference.launch.py model_path:=/workspace/model config_file:=/workspace/config.yaml monitor_only:=${MONITOR_ONLY:-false} debug:=${DEBUG:-false}
