[project]
name = "lerobot-training"
version = "0.1.0"
description = "LeRobot training utilities with custom transforms and camera filtering"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [
    { name = "Anvil Robotics", email = "dev@anvil.bot" }
]
keywords = ["robotics", "lerobot", "training", "imitation-learning"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering",
]

dependencies = [
    "lerobot~=0.5.0",
    "torch>=2.0.0",             # version depends on user's CUDA setup
    "numpy>=2.0.0,<2.3.0",
    "wandb~=0.24",
    "pyyaml~=6.0",
    "tqdm~=4.67",
]

[project.optional-dependencies]
pi = [
    "lerobot[pi]~=0.5.0",
]
groot = [
    "lerobot[groot]~=0.5.0",
]
xvla = [
    "lerobot[xvla]~=0.5.0",
]
smolvla = [
    "lerobot[smolvla]~=0.5.0",
]
all-policies = [
    "lerobot[pi,groot,xvla,smolvla]~=0.5.0",
]
video = [
    "opencv-python>=4.8.0",
    "mcap>=1.1.0",
    "mcap-ros2-support>=0.5.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.0.0",
    "ruff>=0.4.0",
]

[project.scripts]
anvil-trainer = "lerobot_training.train:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lerobot_training"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501", "B008"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
